
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LessonMate AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>LessonMate AI</h1>
        <form id="lesson-form">
            <input type="text" id="class" placeholder="Class" required>
            <input type="text" id="subject" placeholder="Subject" required>
            <input type="text" id="topic" placeholder="Topic" required>
            <input type="text" id="duration" placeholder="Duration" required>
            <select id="language">
                <option value="en">English</option>
                <option value="ur">Urdu</option>
            </select>
            <button type="submit">Generate Lesson Plan</button>
        </form>
        <div id="lesson-plan"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
